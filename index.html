
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Voodoo Draw Fight</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        body { margin: 0; background: #121212; overflow: hidden; font-family: 'Arial', sans-serif; touch-action: none; }
        #ui { position: fixed; top: 20px; width: 100%; text-align: center; color: #00ffcc; pointer-events: none; text-shadow: 2px 2px #000; }
        canvas { display: block; }
    </style>
</head>
<body>
    <div id="ui"><h2>KILICINI CIZ VE VUR!</h2></div>
    <script>
        const { Engine, Render, Runner, World, Bodies, Vertices } = Matter;
        const engine = Engine.create();
        const render = Render.create({
            element: document.body,
            engine: engine,
            options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: '#1a1a1a' }
        });

        // ZEMİN VE DÜŞMANLAR
        const ground = Bodies.rectangle(window.innerWidth/2, window.innerHeight - 20, window.innerWidth, 40, { isStatic: true, render: { fillStyle: '#333' } });
        const wallLeft = Bodies.rectangle(0, window.innerHeight/2, 20, window.innerHeight, { isStatic: true });
        const wallRight = Bodies.rectangle(window.innerWidth, window.innerHeight/2, 20, window.innerHeight, { isStatic: true });
        
        // Kırmızı Düşman Küpleri
        function dusmanYarat() {
            return Bodies.rectangle(window.innerWidth/2 + (Math.random()*100), 100, 50, 50, { 
                render: { fillStyle: '#ff4444' }, 
                friction: 0.1,
                restitution: 0.6
            });
        }
        
        const enemies = [dusmanYarat(), dusmanYarat(), dusmanYarat()];
        World.add(engine.world, [ground, wallLeft, wallRight, ...enemies]);

        // ÇİZİM MEKANİĞİ
        let points = [];
        const canvas = document.querySelector('canvas');

        window.addEventListener('pointerdown', (e) => { points = [{ x: e.clientX, y: e.clientY }]; });
        window.addEventListener('pointermove', (e) => { 
            if(e.buttons === 1) points.push({ x: e.clientX, y: e.clientY }); 
        });
        window.addEventListener('pointerup', () => {
            if (points.length > 8) {
                const weapon = Bodies.fromVertices(points[0].x, points[0].y, [points], {
                    render: { fillStyle: '#00ccff', strokeStyle: 'white', lineWidth: 3 },
                    restitution: 0.5,
                    friction: 0.1
                });
                if(weapon) {
                    World.add(engine.world, weapon);
                    // 5 saniye sonra silahı yok et (performans için)
                    setTimeout(() => World.remove(engine.world, weapon), 5000);
                }
            }
            points = [];
        });

        Runner.run(engine);
        Render.run(render);
    </script>
</body>
</html>
