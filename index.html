<!DOCTYPE html><html><head><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script><style>body{margin:0;background:#1a1a1a;overflow:hidden;touch-action:none;}</style></head><body><script>const{Engine,Render,Runner,World,Bodies}=Matter;const engine=Engine.create();const render=Render.create({element:document.body,engine:engine,options:{width:window.innerWidth,height:window.innerHeight,wireframes:false}});World.add(engine.world,[Bodies.rectangle(window.innerWidth/2,window.innerHeight-20,window.innerWidth,40,{isStatic:true}),Bodies.rectangle(window.innerWidth/2,100,50,50,{render:{fillStyle:'red'}})]);let p=[];window.addEventListener('pointerdown',e=>{p=[{x:e.clientX,y:e.clientY}]});window.addEventListener('pointermove',e=>{if(e.buttons===1)p.push({x:e.clientX,y:e.clientY})});window.addEventListener('pointerup',()=>{if(p.length>5){const w=Bodies.fromVertices(p[0].x,p[0].y,[p],{render:{fillStyle:'cyan'}});if(w)World.add(engine.world,w);}p=[]});Runner.run(engine);Render.run(render);</script></body></html>
