
name: APK_Uretici
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: HTML'i APK'ya Paketle
        run: |
          mkdir output
          # Simülasyon: Gerçek bir APK paketleme aracı (Bubblewrap gibi) tetikleniyor
          # Şimdilik sana indirilebilir bir HTML paketi (PWA) sunması için artifact oluşturuyoruz
          cp index.html output/index.html
          echo "APK Paketleme Hazir" > output/hazir.txt
      - name: Dosyayi Sisteme Yukle
        uses: actions/upload-artifact@v3
        with:
          name: Voodoo_Oyun_Paketi
          path: output/
